apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs-worker-deployment
  labels:
    app: obs-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: obs-worker
  template:
    metadata:
      labels:
        app: obs-worker
    spec:
      containers:
      - name: obs-worker
        image: kube-registry.kube-system.svc.cluster.local:5000/obs-worker:latest
        ports:
        - containerPort: 8888
        command: ["/usr/lib/obs/server/containerworker"]
